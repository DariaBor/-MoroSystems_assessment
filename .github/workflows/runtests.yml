name: Run Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test"
        required: false
        default: "main"

jobs:
  ui-tests:
    name: UI Tests (Chromium Desktop)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout assessment repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npm run test:chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: playwright-report/

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout assessment repo
        uses: actions/checkout@v4

      - name: Checkout todo-be repo
        uses: actions/checkout@v4
        with:
          repository: morosystems/todo-be
          path: todo-be

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install assessment dependencies
        run: npm ci

      - name: Install todo-be dependencies
        run: npm ci
        working-directory: todo-be

      - name: Start backend
        run: |
          nohup npm start &
          sleep 5
        working-directory: todo-be

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080/v3/api-docs

      - name: Generate API schema from live server
        run: npm run generate:api

      - name: Check schema is up to date
        run: git diff --exit-code src/api/generated/schema.ts

      - name: Run API tests
        run: npm run test:api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: playwright-report/
